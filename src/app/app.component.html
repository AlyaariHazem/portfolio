  <main id="main" class="main-shell" tabindex="-1">
    <app-about></app-about>
    <app-skills></app-skills>

<button
  type="button"
  class="back-top-fab"
  [class.is-visible]="showBackToTop()"

  <span class="back-top-fab__icon" aria-hidden="true">
    <i class="bx bx-chevrons-up"></i>
  </span>
  <span class="back-top-fab__label">Top</span>
</button>
