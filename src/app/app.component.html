<!-- HTTP: top bar only (interceptor uses ref "http") -->
<ngx-loading-bar
  ref="http"
  [includeSpinner]="false"
  height="3px"
  color="#0969da"
  style="position: fixed; top: 0; left: 0; right: 0; z-index: 10020">
</ngx-loading-bar>

<!-- Router: spinner only (router listener uses ref "router") -->
<ngx-loading-bar
  ref="router"
  [includeBar]="false"
  color="#0969da"
  style="z-index: 10021">
</ngx-loading-bar>

  <app-about></app-about>
  <app-skills></app-skills>
  <app-education></app-education>
  <app-projects></app-projects>
  <app-contact></app-contact>
</main>
