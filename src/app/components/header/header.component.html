<!-- ======= Mobile nav toggle button ======= -->
<button type="button" class="mobile-nav-toggle d-xl-none" (click)="toggleMobileMenu()">
  <i class="icofont-navigation-menu"></i>
</button>

<!-- ======= Header ======= -->
<header id="header">
  <div class="d-flex flex-column">
    <div class="profile">
        <p><a href="#hero">
          <img src="img/profile-img.webp" alt="Hazem Alyaari" class="img-fluid rounded-circle">
        </a></p>
      <div class="text-center">
        <h1><a href="#hero">Hazem Alyaari</a></h1>
      </div>
      <div class="social-links mt-3 text-center">
        <a href="https://www.linkedin.com/in/hazem-al-yaari-65b141307/" target="_blank" rel="noopener"
          title="LinkedIn Hazem Alyaar" class="linkedin"><i class="bx bxl-linkedin"></i></a>
        <a href="https://github.com/alyaarihazem" target="_blank" rel="noopener" title="GitHub alyaarihazem"
          class="github"><i class="bx bxl-github"></i></a>
        <a href="https://www.facebook.com/profile.php?id=100027605985651" target="_blank" rel="noopener"
          title="Facebook Hazem Abdullah Alyaari" class="facebook"><i class="bx bxl-facebook"></i></a>
        <a href="https://magenta-kitten-9a6e8a.netlify.app/" target="_blank" rel="noopener"
          title="View My E-Commerce Website" class="website">
          <i class="bx bx-cart"></i>
        </a>
      </div>

      <div class="theme-toggle-wrap text-center mt-3">
        <button type="button" class="theme-toggle" (click)="theme.toggle()"
          [attr.aria-label]="theme.isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
          [attr.title]="theme.isDark() ? 'Light mode' : 'Dark mode'">
          <i class="bx" [ngClass]="theme.isDark() ? 'bx-sun' : 'bx-moon'"></i>
        </button>
      </div>
    </div>

    <nav class="nav-menu">
      <ul>
        <li class="active"><a href="#hero"><i class="bx bx-home"></i> <span>Home</span></a></li>
        <li><a href="#about"><i class="bx bx-user"></i> <span>About</span></a></li>
        <li><a href="#services"><i class="bx bx-code-block"></i> Projects</a></li>
        <li><a href="https://app.daily.dev/hazemalyaari" target="_blank" rel="noopener"><i class="bx bx-code-block"></i>
            Daily.Dev</a></li>
        <li><a href="https://www.blogger.com/profile/15568617126796440151" target="_blank" rel="noopener"
            title="Blog posts"><i class="bx bxl-blogger"></i> Blog</a></li>
        <li><a href="#contact"><i class="bx bx-envelope"></i> Contact</a></li>
      </ul>
    </nav>
    <button type="button" class="mobile-nav-toggle d-xl-none" (click)="toggleMobileMenu()"><i
        class="icofont-navigation-menu"></i></button>
  </div>
</header>
