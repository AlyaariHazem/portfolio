<header id="header" class="site-header" [class.site-header--menu-open]="isMobileMenuOpen" [class.site-header--scrolled]="isScrolled">
  <div class="site-header__in">
    <a class="site-header__brand" href="#hero">
      <span class="site-header__avatar-wrap">
        <img
          src="img/profile-img.webp"
          alt=""
          class="site-header__avatar"
          width="40"
          height="40"
          aria-hidden="true">
        <span class="site-header__status" aria-hidden="true"></span>
      </span>
      <span class="site-header__brand-text">
        <strong>Hazem Alyaari</strong>
        <small>Software Engineer · Yemen</small>
      </span>
    </a>

    <nav class="site-header__nav nav-menu" aria-label="Primary">
      <ul>
        <li class="active"><a href="#hero">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#skills">Skills</a></li>
        <li><a href="#services">Projects</a></li>
        <li><a href="#contact">Contact</a></li>
        <li class="site-header__nav-extra"><a href="https://app.daily.dev/hazemalyaari" target="_blank" rel="noopener">Daily.Dev</a></li>
        <li class="site-header__nav-extra"><a href="https://www.blogger.com/profile/15568617126796440151" target="_blank" rel="noopener">Blog</a></li>
      </ul>
    </nav>

    <div class="site-header__actions">
      <div class="site-header__socials">
        <a href="https://www.linkedin.com/in/hazem-al-yaari-65b141307/" target="_blank" rel="noopener" aria-label="LinkedIn">
          <i class="bx bxl-linkedin"></i>
        </a>
        <a href="https://github.com/alyaarihazem" target="_blank" rel="noopener" aria-label="GitHub">
          <i class="bx bxl-github"></i>
        </a>
        <a href="mailto:alyaarihazem@gmail.com" aria-label="Email">
          <i class="bx bx-envelope"></i>
        </a>
      </div>

      <a href="#contact" class="site-header__cta btn-portfolio btn-portfolio--primary scrollto">
        Get in touch <span class="arw">→</span>
      </a>

      <button
        type="button"
        class="site-header__theme"
        (click)="theme.toggle()"
        [attr.aria-label]="theme.isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
        <i class="bx" [ngClass]="theme.isDark() ? 'bx-sun' : 'bx-moon'"></i>
      </button>

      <button
        type="button"
        class="site-header__menu-btn mobile-nav-toggle"
        (click)="toggleMobileMenu()"
        [attr.aria-expanded]="isMobileMenuOpen"
        aria-label="Toggle navigation">
        <i class="bx" [ngClass]="isMobileMenuOpen ? 'bx-x' : 'bx-menu'"></i>
      </button>
    </div>
  </div>

  <nav class="site-header__drawer mobile-nav" aria-label="Mobile" [attr.aria-hidden]="!isMobileMenuOpen">
    <ul>
      <li><a href="#hero" (click)="closeMobileMenu()">Home</a></li>
      <li><a href="#about" (click)="closeMobileMenu()">About</a></li>
      <li><a href="#skills" (click)="closeMobileMenu()">Skills</a></li>
      <li><a href="#services" (click)="closeMobileMenu()">Projects</a></li>
      <li><a href="#contact" (click)="closeMobileMenu()">Contact</a></li>
      <li><a href="https://app.daily.dev/hazemalyaari" target="_blank" rel="noopener">Daily.Dev</a></li>
      <li><a href="https://www.blogger.com/profile/15568617126796440151" target="_blank" rel="noopener">Blog</a></li>
    </ul>
    <div class="site-header__drawer-socials">
      <a href="https://www.linkedin.com/in/hazem-al-yaari-65b141307/" target="_blank" rel="noopener"><i class="bx bxl-linkedin"></i></a>
      <a href="https://github.com/alyaarihazem" target="_blank" rel="noopener"><i class="bx bxl-github"></i></a>
      <a href="https://www.facebook.com/profile.php?id=100027605985651" target="_blank" rel="noopener"><i class="bx bxl-facebook"></i></a>
    </div>
  </nav>
</header>

<div class="site-header__backdrop" [class.is-visible]="isMobileMenuOpen" (click)="closeMobileMenu()" aria-hidden="true"></div>
