<!DOCTYPE html>
<html lang="en" data-theme="dark" class="dark">

<head>
  <meta charset="utf-8">
  <meta http-equiv="x-ua-compatible" content="ie=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0e19" id="meta-theme-color">
  <script>
    (function () {
      try {
        var k = 'portfolio-theme';
        var t = localStorage.getItem(k);
        var root = document.documentElement;
        if (t === 'dark' || t === 'light') {
          root.setAttribute('data-theme', t);
          root.classList.toggle('dark', t === 'dark');
        } else {
          /* Default before Angular boots: dark (no OS theme auto-match). */
          root.setAttribute('data-theme', 'dark');
          root.classList.add('dark');
        }
      } catch (e) { /* ignore */ }
    })();
  </script>

  <title>Hazem Alyaari - Portfolio Website</title>
  <link rel="shortcut icon" href="favicon.ico">
  <meta name="title" content="Hazem Alyaari - Portfolio Website">
  <meta name="description"
    content="Hi There, I'm Hazem Alyaari, a software developer with strong technical skills. Take a look at this portfolio website and feel free to connect with me.">
  <meta name="keywords"
    content="About, Experience, Education, Resume, Projects, Hazem AL-Yaari, AlyaariHazem, Hazem Alyaari, Hazem Alyaari Website, Software Developer, Full Stack Developer, Angular, .NET, Portfolio" />

</head>
